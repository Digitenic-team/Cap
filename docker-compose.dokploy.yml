name: cap

services:
  cap-web:
    container_name: cap-web
    # Build YOUR fork from source (includes GitHub OAuth + SMTP).
    # Do NOT use the upstream ghcr.io/capsoftware/cap-web image here.
    # target MUST be pinned: the Dockerfile's last stage is `proxy` (Caddy),
    # and an unset target would build that instead of the Node server.
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # --- Core ---
      DATABASE_URL: mysql://cap:${MYSQL_PASSWORD}@mysql:3306/cap
      WEB_URL: ${WEB_URL}
      NEXTAUTH_URL: ${WEB_URL}
      DATABASE_ENCRYPTION_KEY: ${DATABASE_ENCRYPTION_KEY}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

      # --- S3 (external provider: AWS S3 / Cloudflare R2 / Backblaze B2 / etc.) ---
      CAP_AWS_ACCESS_KEY: ${CAP_AWS_ACCESS_KEY}
      CAP_AWS_SECRET_KEY: ${CAP_AWS_SECRET_KEY}
      CAP_AWS_BUCKET: ${CAP_AWS_BUCKET}
      CAP_AWS_REGION: ${CAP_AWS_REGION:-us-east-1}
      # Leave empty for real AWS S3. Set to the endpoint for R2/B2/MinIO, e.g.
      # https://<account>.r2.cloudflarestorage.com
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      # Endpoint used for server-side ops (multipart upload initiate, etc.).
      # MUST be set for non-AWS providers: it does NOT fall back to
      # S3_PUBLIC_ENDPOINT in the app, so an unset value silently routes
      # server-side calls to real AWS S3 and fails with InvalidAccessKeyId.
      # Defaults to the public endpoint here so the two can't diverge.
      S3_INTERNAL_ENDPOINT: ${S3_INTERNAL_ENDPOINT:-${S3_PUBLIC_ENDPOINT:-}}
      # false for AWS S3 (virtual-hosted URLs); true for R2/B2/MinIO (path-style)
      S3_PATH_STYLE: ${S3_PATH_STYLE:-false}

      # --- Media server ---
      MEDIA_SERVER_URL: http://media-server:3456
      MEDIA_SERVER_WEBHOOK_SECRET: ${MEDIA_SERVER_WEBHOOK_SECRET}
      MEDIA_SERVER_WEBHOOK_URL: http://cap-web:3000

      # --- Email: Resend (Option A) ---
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_DOMAIN: ${RESEND_FROM_DOMAIN:-}

      # --- Email: SMTP (Option B — used instead of Resend when SMTP_HOST is set) ---
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}

      # --- OAuth: GitHub ---
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

      # --- OAuth: Google (optional) ---
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # --- Chrome extension auth ---
      # Required for the Cap browser extension to connect to a self-hosted
      # instance. Without it, the extension auth flow is only allowed on
      # localhost and self-hosted deployments reject it with a 400.
      # Defaults to the official Chrome Web Store extension ID.
      CAP_CHROME_EXTENSION_ID: ${CAP_CHROME_EXTENSION_ID:-fefjaffcodfiogbbngmjkcjpbpclbdcp}

      # --- AI features (optional) ---
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "3000"
    healthcheck:
      # /api/status returns a plain 200 "OK" with no auth/DB/redirect, so it's
      # a reliable readiness signal (unlike "/", which auth-redirects).
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - cap-network

  # Lightweight Caddy proxy that fronts cap-web. It serves the public/ static
  # assets directly (Next 16 standalone doesn't) and proxies everything else to
  # cap-web:3000. Point the Dokploy domain at this service (cap-proxy:80),
  # NOT at cap-web:3000.
  cap-proxy:
    container_name: cap-proxy
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: proxy
    restart: unless-stopped
    # Only wait for cap-web to *start*, not to be healthy: Caddy serves the
    # static assets on its own and returns a brief 502 for app routes until
    # cap-web is ready, so the proxy must never block the deploy on cap-web's
    # healthcheck.
    depends_on:
      cap-web:
        condition: service_started
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cap-network

  media-server:
    container_name: cap-media-server
    # You didn't modify the media server, so the upstream prebuilt image is fine.
    image: ghcr.io/capsoftware/cap-media-server:latest
    restart: unless-stopped
    environment:
      PORT: 3456
      MEDIA_SERVER_WEBHOOK_SECRET: ${MEDIA_SERVER_WEBHOOK_SECRET}
    # No healthcheck override here: the image already defines a working
    # HEALTHCHECK (bun -e fetch against /health). The previous wget-based
    # check failed only because the oven/bun image ships no wget.
    networks:
      - cap-network

  mysql:
    container_name: cap-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cap
      MYSQL_USER: cap
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --max_connections=1000
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - cap-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "cap", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cap-network

  # MinIO is OFF by default (you use external S3). To run it instead, start the
  # stack with the "minio" profile enabled and point the CAP_AWS_* / S3_* vars
  # above at http://minio:9000.
  minio:
    profiles: ["minio"]
    container_name: cap-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - cap-minio-data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cap-network

  minio-setup:
    profiles: ["minio"]
    container_name: cap-minio-setup
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set capminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb capminio/$${S3_BUCKET:-cap} --ignore-existing;
      mc anonymous set download capminio/$${S3_BUCKET:-cap};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-cap}
    networks:
      - cap-network

volumes:
  cap-mysql-data:
  cap-minio-data:

networks:
  cap-network:
    driver: bridge
